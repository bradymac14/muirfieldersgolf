const ALIAS={'johnny keefer':'john keefer','c bezuidenhout':'christiaan bezuidenhout','m thorbjornsen':'michael thorbjornsen'};
function can(n){const k=norm(n);return ALIAS[k]||k}

function parseESPN(data){
  const comp=data?.events?.[0]?.competitions?.[0];if(!comp)return null;

  const isR3Plus=eventRound>=3;

    const sd=(c.status?.type?.shortDetail||c.status?.displayValue||'').toLowerCase();
    const scoreVal=(c.score||'').toUpperCase();
    const isWD=sn.includes('withdraw')||sn==='wd'||sd.includes('wd')||scoreVal==='WD';

    // Active players not yet started have 4 linescores with tee time in r3 stats
    const r3TeeTime=allLS[2]?.statistics?.categories?.[0]?.stats?.[6]?.displayValue||'';
    const hasTeeTime=r3TeeTime.includes('PDT')||r3TeeTime.includes('EDT')||r3TeeTime.includes('CDT')||r3TeeTime.includes('MST')||r3TeeTime.includes('CST');
    const r3Holes=(allLS[2]?.linescores||[]).length;
    const activelyPlaying=r3Holes>0||(allLS[2]?.value!=null&&allLS[2]?.value!==0);
    // Cut if: R3+ AND no tee time AND not actively playing R3
    const isCutByLS=isR3Plus&&!hasTeeTime&&!activelyPlaying&&!isWD&&allLS.length>=2;
    const isCut=isCutByLS||sn.includes('cut')||sd.includes('cut')||scoreVal==='CUT'||scoreVal==='MC';
    // Total: sum completed rounds from linescores
    const completedLS=allLS.filter(l=>l.value!=null&&l.value!==0&&l.period&&l.period<=2);
    const calcTotal=(()=>{
      const rounds=allLS.filter(l=>l.period&&l.period<=4&&l.value!=null&&!(l.period>=3&&l.value===0));
      if(!rounds.length)return'E';
      const t=rounds.reduce((s,l)=>s+(l.value||0),0);
      return t===0?'E':t>0?`+${t}`:`${t}`;
    })();
    const total=isCut?calcTotal:(c.score||'E');
    // Today: show score if playing, '-' if not yet started, blank if cut
    const r3=allLS[2];
    const r3Val=r3?.value;
    const today=isCut?'':(r3Val!=null&&r3Val!==0?(r3.displayValue||''):'-');
    // Thru: count completed holes in R3 (already computed above as r3Holes)
    const thru=(!isCut&&r3Holes>0)?(r3Holes>=18?'F':`H${r3Holes}`):'';
    return{name,total,order,isCut,isWD,today,thru};
  });
  parsed.sort((a,b)=>a.order-b.order);
  const made=parsed.filter(p=>!p.isCut&&!p.isWD),cut=parsed.filter(p=>p.isCut);
  let i=0;
  while(i<made.length){let j=i;while(j<made.length&&made[j].total===made[i].total)j++;
    const lbl=(j-i)>1?'T'+(i+1):''+(i+1);for(let k=i;k<j;k++)made[k].pos=lbl;i=j;}
  cut.forEach(p=>p.pos='CUT');

  const finalMade=made.filter(p=>p.pos!=='CUT');
  const allCut=[...cut,...made.filter(p=>p.pos==='CUT')];
  // Re-rank made players after removing newly-detected cut players
  let ri=0;
  while(ri<finalMade.length){let rj=ri;
    while(rj<finalMade.length&&finalMade[rj].total===finalMade[ri].total)rj++;
    const lbl=(rj-ri)>1?'T'+(ri+1):''+(ri+1);
    for(let rk=ri;rk<rj;rk++)finalMade[rk].pos=lbl;ri=rj;}
  allCut.forEach(p=>p.pos='CUT');
  return[...finalMade,...allCut];
}

// ── fetch ─────────────────────────────────────────────────────────────────────
async function fetchData(){
  S.refreshing=true;render();
  try{
    const r=await fetch('/api/scores',{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();const ps=parseESPN(j);
    if(!ps||!ps.length)throw new Error('No data');
    S.players=ps;S.error=null;
    S.updated=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    S.status=j?.events?.[0]?.status?.type?.detail||'';
    // Save all player names ESPN ever returned (to distinguish cut vs not in field)
    try{
      const prev=JSON.parse(localStorage.getItem('bz-cache-bn26')||'{}');
      const prevSeen=prev.seen||[];
      const nowSeen=ps.map(p=>can(p.name));
      const allSeen=[...new Set([...prevSeen,...nowSeen])];
      S.seen=allSeen;
      localStorage.setItem('bz-cache-bn26',JSON.stringify({players:ps,updated:S.updated,status:S.status,seen:allSeen}));
    }catch{}
  }catch(e){S.error=e.message||'Refresh failed'}
  S.refreshing=false;render();
}

function boardHTML(){
  const made=S.players.filter(p=>p.pos!=='CUT'&&p.pos!=='WD'),cut=S.players.filter(p=>p.pos==='CUT');
  let h=made.map(p=>pRow(p,S.team)).join('');
  if(cut.length)h+=`<div class="cdiv"><span class="cline"></span><span class="clbl">MISSED CUT</span><span class="cline"></span></div>`+cut.map(p=>pRow(p,S.team)).join('');
  return h;
}

function teamHTML(){
  const t=TEAMS[S.team],byC={};
  S.players.forEach(p=>{byC[can(p.name)]=p});
  const rows=t.picks.map(p=>byC[can(p)]?{...byC[can(p)],_g:getG(p)}:{name:p,missing:true,_g:getG(p)});
  rows.sort((a,b)=>{if(a.missing&&!b.missing)return 1;if(!a.missing&&b.missing)return-1;if(a.pos==='CUT'&&b.pos!=='CUT')return 1;if(a.pos!=='CUT'&&b.pos==='CUT')return-1;return pv(a.pos)-pv(b.pos)});
  const isLateRound=S.status&&/round [34]|final/i.test(S.status);
  const seenSet=new Set(S.seen||[]);
  return`<div class="snote">All 16 picks for <strong style="color:${t.color}">${t.name}</strong>, ranked by position.</div>`+
    rows.map(p=>{
      if(p.missing&&isLateRound&&seenSet.has(can(p.name)))return`<div class="row cutrow"><div class="pos">${icoScissors}</div><div class="nc"><div class="nr"><span style="color:${t.color};display:inline-flex">${icoStar(t.color)}</span><span class="pname gc">${esc(p.name)}</span></div><div class="mr">${gbadge(p._g)}<span class="td-txt">missed cut</span></div></div><div class="sc cutsc">CUT</div></div>`;
      if(p.missing)return`<div class="row missing"><div class="pos">—</div><div class="nc"><div class="nr"><span style="color:${t.color};display:inline-flex">${icoStar(t.color)}</span><span class="pname">${esc(p.name)}</span></div><div class="mr">${gbadge(p._g)}<span class="th-txt">not in field</span></div></div><div class="sc">—</div></div>`;

}

const PO=[1854000,1122700,710700,504700,422300,373375,347625,321875,301275,280675,260075,239475,218875,198275,187975,177675,167375,157075,146775,136475,126175,115875,107635,99395,91155,82915,79825,76735,73645,70555,67465,64375,61285,58710,56135,53560,50985,48925,46865,44805,42745,40685,38625,36565,34505,32445,30385,28737,27295,26471,25853,25235,24823,24411,24205,23999,23793,23587,23381,23175,22969,22763,22557,22351,22145,21939,21733,21527,21321,21115,20909,20703,20497,20291,20085,19879,19673,19467,19261,19055];
const CUT_PAY=0;

function projPay(pos,tieMap){
  if(!pos||pos==='WD')return 0; // not in field
  if(pos==='CUT')return CUT_PAY;
  const rank=parseInt(pos.replace(/^T/,''),10);
  if(isNaN(rank))return 0;
  const n=tieMap[pos]||1;
  let sum=0;
  for(let i=0;i<n;i++){
    const idx=rank-1+i;
    sum+=idx<PO.length?PO[idx]:CUT_PAY;
  }
  return Math.round(sum/n);
}

// Pre-compute how many of 333 teams selected each player
const SELCOUNT={};
PL.forEach((name,idx)=>{
  let c=0;PT.forEach(([,picks])=>{if(picks.includes(idx))c++;});
  SELCOUNT[can(name)]=c;
});

function fmt$(v){
  if(v===0)return'—';
  if(v>=1000000)return'$'+(v/1000000).toFixed(2)+'M';
  if(v>=1000)return'$'+Math.round(v/1000)+'K';
  return'$'+v;
}

const FM={"BRADY MACDOWELL":"#C9A664","BEN JONES":"#3A6094","RICHARD COOMBS":"#9B4A4A"};

function poolHTML(){
  // Build tie map: pos→count of alive players at that position
  const tieMap={};
  S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')tieMap[p.pos]=(tieMap[p.pos]||0)+1});

  // Build pay map by player canonical name
  const pm={};
  S.players.forEach(p=>{pm[can(p.name)]=projPay(p.pos,tieMap)});

  // Score each team: sum projected earnings across 16 picks
  const scored=PT.map(([name,picks])=>({
    name,
    earn:picks.reduce((t,i)=>t+(pm[can(PL[i])]||0),0),
    fc:FM[name]||null
  }));
  scored.sort((a,b)=>b.earn-a.earn); // higher = better

  // Assign ranks
  let rank=1;
  scored.forEach((t,i)=>{if(i>0&&t.earn!==scored[i-1].earn)rank=i+1;t.rank=rank;});

  const q=S.stSearch.toLowerCase();
  const list=q?scored.filter(t=>t.name.toLowerCase().includes(q)):scored;

  let h=`<div class="snote">${scored.length} teams · projected prize earnings · highest wins</div>`;
  h+=`<input class="st-search" id="st-search" placeholder="Search team name…" value="${esc(S.stSearch)}"/>`;
  h+=list.map(t=>`<div class="strow${t.fc?' st-f':''}"${t.fc?` style="--hl:${t.fc}"`:''}><div class="st-rnk">${t.rank}</div><div class="st-nm${t.fc?' fn':''}">${esc(t.name)}</div><div class="st-sc">${fmt$(t.earn)}</div></div>`).join('');
  return h;
}


function summaryHTML(){
  const t=TEAMS[S.team],byC={};S.players.forEach(p=>{byC[can(p.name)]=p});
  const picks=t.picks.map(p=>byC[can(p)]||{missing:true});
  const alive=picks.filter(p=>!p.missing&&p.pos!=='CUT'&&p.pos!=='WD').sort((a,b)=>pv(a.pos)-pv(b.pos));
  const cut=picks.filter(p=>!p.missing&&p.pos==='CUT');
  const best=alive[0];
  const _tm={};S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')_tm[p.pos]=(_tm[p.pos]||0)+1});
  const _pm={};S.players.forEach(p=>{_pm[can(p.name)]=projPay(p.pos,_tm)});
  const _earn=t.picks.reduce((tot,p)=>tot+(_pm[can(p)]||0),0);
  const projStr=_earn>=1000000?'$'+(_earn/1000000).toFixed(2)+'M':_earn>=1000?'$'+Math.round(_earn/1000)+'K':'—';
  return`<section class="sum"><div class="sum-ttl">${icoTrophy}<span>${esc(t.name.toUpperCase())}</span></div>
<div class="srow">
  <div><div class="slbl">Best</div><div class="sval">${best?esc(best.pos):'—'}</div><div class="ssub">${best?esc(best.name.split(' ').slice(-1)[0]):''}</div></div>
  <div><div class="slbl">Top</div><div class="sval">${best?esc(best.total):'—'}</div><div class="ssub">lead pick</div></div>
  <div><div class="slbl">Alive</div><div class="sval">${alive.length}<span style="font-size:13px;color:#9A9A9A">/${t.picks.length}</span></div><div class="ssub">in field</div></div>
  <div><div class="slbl">Cut</div><div class="sval">${cut.length}</div><div class="ssub">missed</div></div>
  <div><div class="slbl">Proj.</div><div class="sval" style="font-size:15px">${projStr}</div><div class="ssub">earnings</div></div>
</div></section>`;
}

// ── render ────────────────────────────────────────────────────────────────────
function render(){
  const t=TEAMS[S.team],rnd=S.status||'Round 3';
  document.getElementById('root').innerHTML=`<div class="app" style="--tc:${t.color}">
<header class="hdr">
  <div class="hdr-row">
    <div>
      <div class="kicker">CJ CUP · ${esc(rnd.toUpperCase())}</div>
      <h1 class="title">Muirfielders</h1>
      <div class="subtitle">Byron Nelson · TPC Craig Ranch</div>
    </div>
    <button class="rbtn${S.refreshing?' spinning':''}" id="rbtn">${icoRefresh}</button>
  </div>
  <div class="upd-row"><span class="dot"></span><span>${S.updated?'Live · '+S.updated:'Connecting…'}</span></div>
  ${S.error?`<div class="err">⚠ ${esc(S.error)}</div>`:''}
</header>
<div class="tsel">${Object.entries(TEAMS).map(([k,tm])=>`<button class="tbtn${S.team===k?' sel':''}" data-team="${k}" style="--tc:${tm.color}"><div class="tbtn-name">${esc(tm.short)}</div><div class="tbtn-lbl">${tm.init}</div></button>`).join('')}</div>
${summaryHTML()}
<nav class="tabs">
  <button class="tab${S.view==='board'?' active':''}" data-view="board">${icoList} Leaderboard</button>
  <button class="tab${S.view==='team'?' active':''}" data-view="team">${icoStar(S.view==='team'?'#C9A664':'currentColor')} Team</button>
  <button class="tab${S.view==='groups'?' active':''}" data-view="groups">${icoLayers} Groups</button>
  <button class="tab${S.view==='pool'?' active':''}" data-view="pool">${icoPool} Pool</button>
</nav>
<main class="main">${S.view==='board'?boardHTML():S.view==='team'?teamHTML():S.view==='groups'?groupsHTML():poolHTML()}</main>
<footer class="footer">ESPN data · auto-refreshes every 60s</footer>
</div>`;

  const ss=document.getElementById('st-search');
  if(ss){ss.oninput=e=>{S.stSearch=e.target.value;render()};if(S.view==='pool')setTimeout(()=>ss.focus(),50);}

}

// ── init ──────────────────────────────────────────────────────────────────────
render();
fetchData();

// Single delegated listener - survives re-renders, reliable on mobile
document.getElementById('root').addEventListener('click',function(e){
  const b=e.target.closest('#rbtn,[data-team],[data-view],[data-group],[data-back]');
  if(!b)return;
  if(b.id==='rbtn'){if(!S.refreshing)fetchData();return;}
  if(b.dataset.team){S.team=b.dataset.team;try{localStorage.setItem('bz-team',S.team)}catch{}render();return;}
  if(b.dataset.view){S.view=b.dataset.view;if(S.view==='groups')S.group=null;render();return;}
  if(b.dataset.group){S.group=+b.dataset.group;render();return;}
  if(b.hasAttribute('data-back')){S.group=null;render();return;}
});

let intv=setInterval(()=>{if(!document.hidden&&!S.refreshing)fetchData()},60000);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)clearInterval(intv);
  else{fetchData();intv=setInterval(()=>{if(!S.refreshing)fetchData()},60000)}
});
})();
